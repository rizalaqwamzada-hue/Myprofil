<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime List – Rizal</title>
<style>
:root{--bg:#0f1220;--card:#171a2e;--txt:#a76133;--muted:#9aa0c3;--acc:#6c7cff}
body.light{--bg:#f4f6ff;--card:#fff;--txt:#111;--muted:#555;--acc:#3b5cff}
*{box-sizing:border-box;font-family:system-ui}
body{margin:0;background:var(--bg);color:var(--txt)}
header{padding:16px;border-bottom:1px solid #24284a}
nav a{margin-right:12px;color:var(--txt);text-decoration:none}
#pimg{
width:100%;
max-height:420px;
object-fit:cover;
image-rendering:auto;
}
nav a.active{background:var(--acc);color:#fff;padding:6px 12px;border-radius:10px}
button{background:var(--acc);border:none;color:#fff;padding:6px 10px;border-radius:8px}
main{max-width:900px;margin:auto;padding:16px}
.card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:12px}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.item{background:#0b0e1a;border-radius:12px;padding:10px;cursor:pointer;animation:itemFade .6s ease forwards;color:white;}
 body.light .item{
 background:#e9ecff;
color:#111;
}
.badge{background:#222766;border-radius:8px;padding:2px 8px;font-size:12px;margin-right:4px}
.page-animate{animation:fadeSlide .8s ease forwards}
@keyframes fadeSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes itemFade{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
</style>
 
</head>
 
<body>
<header>
<h1>📺 Anime List</h1>
<nav>
<a href="index.html">Home</a>

<a href="game.html">Game</a>
<a href="film.html">Film</a>
<button onclick="toggle()">🌗</button>
</nav>
</header>

<main class="page-animate">
<div class="card">
<input id="q" placeholder="Cari anime…" oninput="render()">
<select id="genreFilter" onchange="render()">
<option value="">Semua Genre</option>
<option value="Adventure">Adventure</option>
<option value="Action">Action</option>
<option value="Comedy">Comedy</option>
<option value="Dark Comedy">Dark Comedy</option>
<option value="Dark Fantasy">Dark Fantasy</option>
<option value="Drama">Drama</option>
<option value="3cch1">3cch1</option>
<option value="Fantasy">Fantasy</option>
<option value="Game">Game</option>
<option value="Harem">Harem</option>
<option value="Horror">Horror</option>
<option value="Isekai">Isekai</option>
<option value="Magic">Magic</option>
<option value="Martial Arts">Martial Arts</option>
<option value="Mecha">Mecha</option>
<option value="Military">Military</option>
<option value="Music">Music</option>
<option value="Mystery">Mystery</option>
<option value="Romance">Romance</option>
<option value="School">School</option>
<option value="Sci-Fi">Sci-Fi</option>
<option value="Seinen">Seinen</option>
<option value="Slice of Life">Slice of Life</option>
<option value="Supernatural">Supernatural</option>
<option value="Vrmmo">Vrmmo</option>
</select>
</div>

<div class="card">
<h2>📊 Statistik Anime</h2>
<p id="total"></p>
</div>

<div class="list" id="list"></div>
<div id="popup" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
align-items:center;
justify-content:center;">

<div style="
background:#171a2e;
padding:20px;
border-radius:14px;
max-width:400px;
text-align:center">

<img id="pimg" style="width:100%;border-radius:10px">

<h2 id="ptitle"></h2>

<p id="pgenre"></p>

<p id="pdesc"></p>

<p>
<a id="poff" target="_blank">🔗 Official</a><br>
<a id="punoff" target="_blank">🔗Alternative</a>
</p>

<button onclick="closePopup()">Tutup</button>

</div>
</div>
</main>

function openDetail(id){

 const a = anime.find(x=>x.id===id)

 document.getElementById("pimg").src=a.img
 document.getElementById("ptitle").innerText=a.name
 document.getElementById("pgenre").innerText=a.genre.join(', ')
 document.getElementById("pdesc").innerText=a.desc
 document.getElementById("poff").href=a.official
 document.getElementById("punoff").href=a.unofficial

 document.getElementById("popup").style.display="flex"

}

 function closePopup(){
 document.getElementById("popup").style.display="none"
}
function render(){
 const q=document.getElementById('q').value.toLowerCase();
 const g=document.getElementById('genreFilter').value;
 list.innerHTML=anime
 .filter(x=>x.name.toLowerCase().includes(q))
 .filter(x=>!g || x.genre.includes(g))
 .sort((a,b)=>a.name.localeCompare(b.name))
 .map(x=>`<div class='item' onclick="openDetail('${x.id}')">
 <b>${x.name}</b><br>
 <span class='badge'>${x.genre.join(', ')}</span>
 <span class='badge'>${x.season}</span>
 </div>`)
 .join('');
}

document.getElementById('total').innerText='Total Anime : '+anime.length;

function toggle(){
 document.body.classList.toggle('light');
 localStorage.mode=document.body.classList.contains('light')?'light':'dark';
}
if(localStorage.mode==='light')document.body.classList.add('light');
render();
